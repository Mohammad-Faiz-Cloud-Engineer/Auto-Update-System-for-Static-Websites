<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Update v2.2 - Service Worker Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #111827;
    }

    .version {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .feature {
      padding: 20px;
      background: #f9fafb;
      border-radius: 12px;
      border: 2px solid #e5e7eb;
    }

    .feature.active {
      border-color: #667eea;
      background: #ede9fe;
    }

    .feature h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #111827;
    }

    .feature p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }

    .status.online {
      background: #d1fae5;
      color: #065f46;
    }

    .status.offline {
      background: #fee2e2;
      color: #991b1b;
    }

    .status.enabled {
      background: #dbeafe;
      color: #1e40af;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .log {
      margin-top: 30px;
      padding: 20px;
      background: #1f2937;
      border-radius: 12px;
      color: #f9fafb;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .log-entry {
      margin-bottom: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #374151;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #9ca3af;
      margin-right: 8px;
    }

    .log-success {
      color: #34d399;
    }

    .log-error {
      color: #f87171;
    }

    .log-info {
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Auto-Update v2.2</h1>
    <p class="version">Service Worker Integration Demo</p>

    <div class="feature-grid">
      <div class="feature" id="feature-sw">
        <h3>Service Worker</h3>
        <p>Offline-first caching</p>
        <span class="status enabled" id="sw-status">Checking...</span>
      </div>

      <div class="feature" id="feature-offline">
        <h3>Offline Mode</h3>
        <p>Works without internet</p>
        <span class="status online" id="offline-status">Online</span>
      </div>

      <div class="feature" id="feature-sync">
        <h3>Background Sync</h3>
        <p>Auto-sync when online</p>
        <span class="status enabled" id="sync-status">Enabled</span>
      </div>

      <div class="feature" id="feature-delta">
        <h3>Delta Updates</h3>
        <p>Only download changes</p>
        <span class="status enabled" id="delta-status">Enabled</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn-primary" onclick="checkForUpdates()">
        Check for Updates
      </button>
      <button class="btn-secondary" onclick="triggerSync()">
        Trigger Background Sync
      </button>
      <button class="btn-secondary" onclick="goOffline()">
        Simulate Offline
      </button>
      <button class="btn-secondary" onclick="clearLogs()">
        Clear Logs
      </button>
    </div>

    <div class="log" id="log">
      <div class="log-entry log-info">
        <span class="log-time">[00:00:00]</span>
        <span>Initializing Auto-Update System v2.2...</span>
      </div>
    </div>
  </div>

  <script src="../src/auto-update.js"></script>
  <script>
    // Initialize logging
    function addLog(message, type = 'info') {
      const log = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      
      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `
        <span class="log-time">[${time}]</span>
        <span>${message}</span>
      `;
      
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    function clearLogs() {
      document.getElementById('log').innerHTML = '';
      addLog('Logs cleared', 'info');
    }

    // Update status indicators
    function updateStatus() {
      // Online/Offline status
      const offlineStatus = document.getElementById('offline-status');
      if (navigator.onLine) {
        offlineStatus.textContent = 'Online';
        offlineStatus.className = 'status online';
      } else {
        offlineStatus.textContent = 'Offline';
        offlineStatus.className = 'status offline';
      }

      // Service Worker status
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(reg => {
          const swStatus = document.getElementById('sw-status');
          if (reg) {
            swStatus.textContent = 'Active';
            swStatus.className = 'status enabled';
            document.getElementById('feature-sw').classList.add('active');
          } else {
            swStatus.textContent = 'Not Registered';
            swStatus.className = 'status offline';
          }
        });
      }
    }

    // Initialize Auto-Update with v2.2 features
    AutoUpdate.init({
      manifestUrl: '/version-manifest.json',
      checkInterval: 30000,
      forceUpdate: false,
      showNotification: true,
      debug: true,
      
      // v2.2 features
      serviceWorker: true,
      serviceWorkerUrl: '/auto-update-sw.js',
      offlineFirst: true,
      backgroundSync: true,
      deltaUpdates: true,
      precacheUrls: [
        '/',
        '/index.html',
        '/auto-update.js',
        '/auto-update-sw.js'
      ],
      
      onUpdateAvailable: (newVersion, oldVersion) => {
        addLog(`🎉 Update available: ${oldVersion} → ${newVersion}`, 'success');
      },
      
      onUpdateComplete: (version) => {
        addLog(`✅ Update complete: ${version}`, 'success');
      },
      
      onError: (error) => {
        addLog(`❌ Error: ${error.message}`, 'error');
      },
      
      onServiceWorkerUpdate: (worker) => {
        addLog('🔄 Service Worker updated', 'info');
        updateStatus();
      }
    });

    addLog('✅ Auto-Update System initialized', 'success');
    addLog('📦 Service Worker: Enabled', 'info');
    addLog('🔄 Background Sync: Enabled', 'info');
    addLog('📊 Delta Updates: Enabled', 'info');
    addLog('💾 Offline-First: Enabled', 'info');

    // Update status on load
    updateStatus();

    // Listen for online/offline events
    window.addEventListener('online', () => {
      addLog('🌐 Connection restored', 'success');
      updateStatus();
    });

    window.addEventListener('offline', () => {
      addLog('📡 Connection lost - working offline', 'info');
      updateStatus();
    });

    // Functions for buttons
    function checkForUpdates() {
      addLog('🔍 Checking for updates...', 'info');
      AutoUpdate.checkNow()
        .then(() => {
          addLog('✅ Update check complete', 'success');
        })
        .catch((error) => {
          addLog(`❌ Update check failed: ${error.message}`, 'error');
        });
    }

    function triggerSync() {
      if (AutoUpdate.syncNow) {
        addLog('🔄 Triggering background sync...', 'info');
        AutoUpdate.syncNow()
          .then((success) => {
            if (success) {
              addLog('✅ Background sync registered', 'success');
            } else {
              addLog('⚠️ Background sync not available', 'info');
            }
          });
      } else {
        addLog('⚠️ Background sync not supported', 'info');
      }
    }

    function goOffline() {
      addLog('📡 Simulating offline mode...', 'info');
      addLog('💡 Tip: Use browser DevTools to actually go offline', 'info');
      addLog('💡 Network tab → Throttling → Offline', 'info');
    }

    // Log Service Worker messages
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', (event) => {
        const { type, version, changedFiles } = event.data;
        
        switch (type) {
          case 'UPDATE_AVAILABLE':
            addLog(`📦 Service Worker detected update: ${version}`, 'info');
            break;
          case 'DELTA_UPDATE_COMPLETE':
            addLog(`✅ Delta update complete (${changedFiles.length} files)`, 'success');
            break;
          case 'APPLY_UPDATE':
            addLog('🔄 Applying update...', 'info');
            break;
        }
      });
    }

    // Update status every 5 seconds
    setInterval(updateStatus, 5000);
  </script>
</body>
</html>
